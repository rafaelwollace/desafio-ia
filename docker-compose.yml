services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projetos-backend
    environment:
      PORT: 3000
      FRONTEND_URL: http://localhost:8080
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: projetos-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
